            <p>¿Tienes un proyecto en mente o quieres saber más sobre mi trabajo? Escríbeme.</p>

            <form action="#" method="POST">
                <label for="campoNombre">Nombre</label>

                <label for="campoMensaje">Mensaje</label>
                <textarea id="campoMensaje" name="mensaje" rows="5" required></textarea>

                <button type="submit">Enviar mensaje</button>
